<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="mobileGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#01737d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3be8b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="screenGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D1F34;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#163C53;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#mobileGradient)" rx="20"/>
  
  <!-- Mobile Phone -->
  <g transform="translate(150, 50)">
    <!-- Phone Body -->
    <rect x="0" y="0" width="100" height="200" rx="15" fill="#2a2a2a" stroke="#00aac7" stroke-width="2"/>
    
    <!-- Screen -->
    <rect x="5" y="10" width="90" height="140" rx="8" fill="url(#screenGradient)"/>
    
    <!-- App Interface -->
    <rect x="15" y="25" width="70" height="8" rx="4" fill="#00aac7"/>
    <rect x="15" y="40" width="50" height="6" rx="3" fill="#3be8b0"/>
    <rect x="15" y="55" width="60" height="6" rx="3" fill="#01737d"/>
    
    <!-- App Icons -->
    <circle cx="25" cy="80" r="8" fill="#00aac7"/>
    <circle cx="45" cy="80" r="8" fill="#3be8b0"/>
    <circle cx="65" cy="80" r="8" fill="#01737d"/>
    
    <!-- Code Elements -->
    <rect x="15" y="100" width="70" height="4" rx="2" fill="#00aac7"/>
    <rect x="15" y="110" width="60" height="4" rx="2" fill="#3be8b0"/>
    <rect x="15" y="120" width="50" height="4" rx="2" fill="#01737d"/>
    
    <!-- Home Button -->
    <circle cx="50" cy="170" r="8" fill="#00aac7"/>
  </g>
  
  <!-- Floating Elements -->
  <circle cx="80" cy="80" r="15" fill="#00aac7" opacity="0.3"/>
  <circle cx="320" cy="120" r="12" fill="#3be8b0" opacity="0.3"/>
  <circle cx="90" cy="220" r="10" fill="#01737d" opacity="0.3"/>
  
  <!-- Code Symbols -->
  <text x="50" y="280" font-family="monospace" font-size="12" fill="#00aac7" opacity="0.7">&lt;/&gt;</text>
  <text x="350" y="280" font-family="monospace" font-size="12" fill="#3be8b0" opacity="0.7">{}</text>
</svg> 