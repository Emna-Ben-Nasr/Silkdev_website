<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="consultingGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#01737d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3be8b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="chartGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D1F34;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#163C53;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#consultingGradient)" rx="20"/>
  
  <!-- Consulting Dashboard -->
  <g transform="translate(60, 50)">
    <!-- Main Dashboard -->
    <rect x="0" y="0" width="280" height="200" rx="10" fill="url(#chartGradient)" stroke="#00aac7" stroke-width="2"/>
    
    <!-- Header -->
    <rect x="0" y="0" width="280" height="30" rx="10" fill="#00aac7"/>
    <text x="10" y="20" font-family="Arial" font-size="12" fill="white" font-weight="bold">Consulting Dashboard</text>
    
    <!-- Analytics Chart -->
    <g transform="translate(20, 50)">
      <!-- Chart Background -->
      <rect x="0" y="0" width="120" height="80" rx="5" fill="#1D1F34"/>
      
      <!-- Chart Bars -->
      <rect x="10" y="60" width="15" height="15" fill="#00aac7"/>
      <rect x="30" y="50" width="15" height="25" fill="#3be8b0"/>
      <rect x="50" y="40" width="15" height="35" fill="#01737d"/>
      <rect x="70" y="30" width="15" height="45" fill="#00aac7"/>
      <rect x="90" y="20" width="15" height="55" fill="#3be8b0"/>
      <rect x="110" y="10" width="15" height="65" fill="#01737d"/>
    </g>
    
    <!-- Strategy Board -->
    <g transform="translate(160, 50)">
      <rect x="0" y="0" width="100" height="80" rx="5" fill="#1D1F34"/>
      
      <!-- Strategy Items -->
      <rect x="5" y="5" width="90" height="15" rx="3" fill="#00aac7"/>
      <rect x="5" y="25" width="90" height="15" rx="3" fill="#3be8b0"/>
      <rect x="5" y="45" width="90" height="15" rx="3" fill="#01737d"/>
      <rect x="5" y="65" width="90" height="15" rx="3" fill="#00aac7"/>
    </g>
    
    <!-- Metrics -->
    <g transform="translate(20, 150)">
      <!-- Metric Cards -->
      <rect x="0" y="0" width="70" height="40" rx="5" fill="#00aac7" opacity="0.8"/>
      <rect x="80" y="0" width="70" height="40" rx="5" fill="#3be8b0" opacity="0.8"/>
      <rect x="160" y="0" width="70" height="40" rx="5" fill="#01737d" opacity="0.8"/>
      
      <!-- Metric Icons -->
      <circle cx="35" cy="15" r="8" fill="#3be8b0"/>
      <circle cx="115" cy="15" r="8" fill="#01737d"/>
      <circle cx="195" cy="15" r="8" fill="#00aac7"/>
    </g>
  </g>
  
  <!-- Consulting Tools -->
  <g transform="translate(320, 80)">
    <!-- Document Stack -->
    <rect x="0" y="0" width="60" height="8" rx="2" fill="#00aac7"/>
    <rect x="2" y="8" width="56" height="8" rx="2" fill="#3be8b0"/>
    <rect x="4" y="16" width="52" height="8" rx="2" fill="#01737d"/>
    
    <!-- Analysis Icons -->
    <circle cx="30" cy="40" r="12" fill="#00aac7" opacity="0.6"/>
    <circle cx="30" cy="40" r="6" fill="#3be8b0"/>
  </g>
  
  <!-- Floating Elements -->
  <circle cx="80" cy="80" r="15" fill="#00aac7" opacity="0.3"/>
  <circle cx="320" cy="120" r="12" fill="#3be8b0" opacity="0.3"/>
  <circle cx="90" cy="220" r="10" fill="#01737d" opacity="0.3"/>
  
  <!-- Consulting Symbols -->
  <text x="50" y="280" font-family="Arial" font-size="12" fill="#00aac7" opacity="0.7">Strategy</text>
  <text x="320" y="280" font-family="Arial" font-size="12" fill="#3be8b0" opacity="0.7">Analysis</text>
</svg> 