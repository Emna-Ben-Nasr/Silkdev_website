<svg width="400" height="300" viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="webGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#01737d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3be8b0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="browserGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1D1F34;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#163C53;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="300" fill="url(#webGradient)" rx="20"/>
  
  <!-- Web Browser -->
  <g transform="translate(80, 60)">
    <!-- Browser Window -->
    <rect x="0" y="0" width="240" height="160" rx="8" fill="url(#browserGradient)" stroke="#00aac7" stroke-width="2"/>
    
    <!-- Browser Header -->
    <rect x="0" y="0" width="240" height="25" rx="8" fill="#00aac7"/>
    
    <!-- Browser Controls -->
    <circle cx="15" cy="12" r="4" fill="#3be8b0"/>
    <circle cx="30" cy="12" r="4" fill="#01737d"/>
    <circle cx="45" cy="12" r="4" fill="#00aac7"/>
    
    <!-- Address Bar -->
    <rect x="60" y="5" width="160" height="15" rx="3" fill="#1D1F34"/>
    <text x="65" y="15" font-family="monospace" font-size="8" fill="#00aac7">silkdev.io</text>
    
    <!-- Website Content -->
    <rect x="10" y="35" width="220" height="115" rx="3" fill="#1D1F34"/>
    
    <!-- Navigation Menu -->
    <rect x="15" y="40" width="60" height="20" rx="3" fill="#00aac7"/>
    <rect x="85" y="40" width="50" height="20" rx="3" fill="#3be8b0"/>
    <rect x="145" y="40" width="45" height="20" rx="3" fill="#01737d"/>
    <rect x="200" y="40" width="25" height="20" rx="3" fill="#00aac7"/>
    
    <!-- Content Sections -->
    <rect x="15" y="70" width="100" height="40" rx="3" fill="#00aac7" opacity="0.8"/>
    <rect x="125" y="70" width="100" height="40" rx="3" fill="#3be8b0" opacity="0.8"/>
    
    <!-- Text Content -->
    <rect x="15" y="120" width="210" height="8" rx="2" fill="#01737d"/>
    <rect x="15" y="135" width="180" height="8" rx="2" fill="#00aac7"/>
    <rect x="15" y="150" width="160" height="8" rx="2" fill="#3be8b0"/>
  </g>
  
  <!-- Code Elements -->
  <g transform="translate(320, 80)">
    <!-- HTML Tag -->
    <text x="0" y="0" font-family="monospace" font-size="12" fill="#00aac7">&lt;html&gt;</text>
    <text x="0" y="20" font-family="monospace" font-size="12" fill="#3be8b0">&lt;body&gt;</text>
    <text x="0" y="40" font-family="monospace" font-size="12" fill="#01737d">&lt;/body&gt;</text>
    <text x="0" y="60" font-family="monospace" font-size="12" fill="#00aac7">&lt;/html&gt;</text>
  </g>
  
  <!-- Floating Elements -->
  <circle cx="60" cy="80" r="12" fill="#00aac7" opacity="0.3"/>
  <circle cx="340" cy="120" r="15" fill="#3be8b0" opacity="0.3"/>
  <circle cx="70" cy="220" r="10" fill="#01737d" opacity="0.3"/>
  
  <!-- Web Symbols -->
  <text x="50" y="280" font-family="Arial" font-size="12" fill="#00aac7" opacity="0.7">Web</text>
  <text x="320" y="280" font-family="Arial" font-size="12" fill="#3be8b0" opacity="0.7">Dev</text>
</svg> 